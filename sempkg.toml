# sempkg workspace manifest
# Run 'sempkg sync' to install dependencies.

[dependencies]
codegraph = { version = "0.9.7", git = "github:colbymchenry/codegraph", git_ref = "v0.9.7", full = true, include_source = true, source_dirs = ['.\src\'], docs_dirs = ['.\docs\'] }
lancedb = { version = "0.30.0", git = "github:lancedb/lancedb", git_ref = "v0.30.0", full = true, include_source = true, source_dirs = ['.\rust\lancedb\src'], docs_dirs = ['.\docs\src\'] }
llama-cpp-rs = { version = "0.1.150", git = "github:utilityai/llama-cpp-rs", git_ref = "0.1.150", full = true, include_source = true, source_dirs = ["llama-cpp-2/src"] }
qmd = { version = "2.5.2", git = "github:tobi/qmd", git_ref = "v2.5.2", full = true, include_source = true, source_dirs = ['.\src\'], docs_dirs = ['.\docs\'] }
sempkg = { version = "0.3.0-beta-30-gcfcfdefb0b81", local = ".", include_source = true, source_dirs = ['.\src\'], docs_dirs = ['.\docs\'] }

[embedding]
enabled = true
model_id = "embeddinggemma-300m"   # or "qwen3-embedding-0.6b"
n_ctx = 2048
# Hardware acceleration (local provider). `gpu` = "auto" (default) uses the GPU
# when this binary was built with a GPU backend (e.g. `--features embeddings,cuda`
# or `…,vulkan`) and falls back to CPU otherwise; "on" forces GPU, "off" forces CPU.
# `n_threads` = 0 uses all logical CPU cores for CPU-side work.
# `gpu_layers` is an advanced manual override (0 = let `gpu` decide).
gpu = "auto"
n_threads = 0
gpu_layers = 0

[query_expansion]
enabled = true
max_variants = 4
gpu = "auto"
n_threads = 0
gpu_layers = 0
max_tokens = 256
n_ctx = 2048
temperature = 0.699999988079071

[reranker]
enabled = true
top_k = 20
output_n = 5
gpu = "auto"
n_threads = 0
gpu_layers = 0
