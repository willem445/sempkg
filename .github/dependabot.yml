# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"

  # Single cargo workspace rooted at the repo — one manifest/lockfile covers both
  # member crates (src/sembundle, src/sempkg).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # arrow-array/arrow-schema must move in lockstep with each other and with
      # lancedb: lancedb pins `arrow ^58`, so an arrow bump ahead of lancedb puts
      # two arrow versions in the tree and breaks the build. Grouping them into a
      # single PR keeps them coordinated (and easy to close together while
      # lancedb still trails the latest arrow).
      arrow-lance:
        patterns:
          - "arrow*"
          - "lance*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
