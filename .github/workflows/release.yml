name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build:
    name: Build ${{ matrix.binary }} — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── sembundle ──────────────────────────────────────────────────────
          - binary: sembundle
            manifest: src/sembundle/Cargo.toml
            os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - binary: sembundle
            manifest: src/sembundle/Cargo.toml
            os: macos-13               # last Intel runner
            target: x86_64-apple-darwin
            ext: ""
          - binary: sembundle
            manifest: src/sembundle/Cargo.toml
            os: macos-latest           # ARM runner (macos-14+)
            target: aarch64-apple-darwin
            ext: ""
          - binary: sembundle
            manifest: src/sembundle/Cargo.toml
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""

          # ── sempkg ────────────────────────────────────────────────────────
          - binary: sempkg
            manifest: src/sempkg/Cargo.toml
            os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - binary: sempkg
            manifest: src/sempkg/Cargo.toml
            os: macos-13
            target: x86_64-apple-darwin
            ext: ""
          - binary: sempkg
            manifest: src/sempkg/Cargo.toml
            os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - binary: sempkg
            manifest: src/sempkg/Cargo.toml
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache is scoped to the crate being built (src/sembundle or src/sempkg).
      # Binary name matches its source directory name, so this resolves correctly.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/${{ matrix.binary }} -> target
          key: ${{ matrix.target }}

      # aws-lc-rs requires cmake + clang on Linux.
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang libclang-dev llvm-dev

      # llvm-config + libclang are needed by bindgen (llama-cpp-sys via
      # sempkg's optional reranker feature).
      - name: Install LLVM and libclang (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install llvm

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm --no-progress -y

      - name: Resolve LIBCLANG_PATH (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if command -v llvm-config >/dev/null 2>&1; then
            echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
            exit 0
          fi

          for p in /opt/homebrew/opt/llvm/bin /usr/local/opt/llvm/bin; do
            if [ -x "$p/llvm-config" ]; then
              echo "LIBCLANG_PATH=$($p/llvm-config --libdir)" >> "$GITHUB_ENV"
              exit 0
            fi
          done

          echo "llvm-config not found; cannot resolve LIBCLANG_PATH" >&2
          exit 1

      - name: Resolve LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # NASM is optional on Windows but avoids aws-lc-rs assembly warnings
      # and produces faster crypto code.
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      # lance-encoding requires protoc at build time
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: |
          if [ "${{ matrix.binary }}" = "sempkg" ]; then
            cargo build --release --manifest-path ${{ matrix.manifest }} --target ${{ matrix.target }} --features reranker
          else
            cargo build --release --manifest-path ${{ matrix.manifest }} --target ${{ matrix.target }}
          fi

      # Copy the binary to the repo root with a platform-stamped name so all
      # artifacts can be collected in a flat directory later.
      - name: Stage artifact
        shell: bash
        run: |
          crate_dir="${{ matrix.manifest }}"
          crate_dir="${crate_dir%/Cargo.toml}"
          src="${crate_dir}/target/${{ matrix.target }}/release/${{ matrix.binary }}${{ matrix.ext }}"
          artifact="${{ matrix.binary }}-${{ matrix.target }}${{ matrix.ext }}"
          cp "${src}" "${artifact}"
          echo "ARTIFACT=${artifact}" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.target }}
          path: ${{ env.ARTIFACT }}
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
