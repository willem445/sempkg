name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  # Manual runs build (and cache) every artifact — including the CUDA job — so
  # the pipeline can be smoke-tested without cutting a tag. The "Publish GitHub
  # Release" job is skipped on manual runs (see its `if:` guard).
  workflow_dispatch:

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build:
    name: Build ${{ matrix.binary }} — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: -C debuginfo=0
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── sembundle ──────────────────────────────────────────────────────
          - binary: sembundle
            manifest: src/sembundle/Cargo.toml
            os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - binary: sembundle
            manifest: src/sembundle/Cargo.toml
            os: macos-latest           # ARM runner (macos-14+)
            target: aarch64-apple-darwin
            ext: ""
          - binary: sembundle
            manifest: src/sembundle/Cargo.toml
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""

          # ── sempkg ────────────────────────────────────────────────────────
          # `features` is matrix-driven so every sempkg artifact ships the full
          # local-inference set (reranker + embeddings + query expansion). The
          # sembundle rows leave it empty — that crate has no optional features.
          - binary: sempkg
            manifest: src/sempkg/Cargo.toml
            os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            features: reranker,embeddings
          # Every aarch64-apple-darwin machine has a Metal GPU and the macos-14+
          # runners ship the Metal toolchain with Xcode, so the one macOS
          # artifact is GPU-capable — no separate variant. `gpu = "auto"` still
          # degrades to CPU wherever offload is unavailable.
          - binary: sempkg
            manifest: src/sempkg/Cargo.toml
            os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            features: reranker,embeddings,metal
          - binary: sempkg
            manifest: src/sempkg/Cargo.toml
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""
            features: reranker,embeddings

    steps:
      - uses: actions/checkout@v7

      - name: Free disk space (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo apt-get clean
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Single cargo workspace at the repo root — one shared target/ and lockfile
      # for both member crates.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: ${{ matrix.target }}-${{ matrix.binary }}

      # aws-lc-rs requires cmake + clang on Linux.
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang libclang-dev llvm-dev

      # llvm-config + libclang are needed by bindgen (llama-cpp-sys via
      # sempkg's optional reranker feature).
      - name: Install LLVM and libclang (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install llvm

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm --no-progress -y

      - name: Resolve LIBCLANG_PATH (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if command -v llvm-config >/dev/null 2>&1; then
            echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
            exit 0
          fi

          for p in /opt/homebrew/opt/llvm/bin /usr/local/opt/llvm/bin; do
            if [ -x "$p/llvm-config" ]; then
              echo "LIBCLANG_PATH=$($p/llvm-config --libdir)" >> "$GITHUB_ENV"
              exit 0
            fi
          done

          echo "llvm-config not found; cannot resolve LIBCLANG_PATH" >&2
          exit 1

      - name: Resolve LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # NASM is optional on Windows but avoids aws-lc-rs assembly warnings
      # and produces faster crypto code.
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      # lance-encoding requires protoc at build time
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        shell: bash
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo build --release --manifest-path ${{ matrix.manifest }} --target ${{ matrix.target }} --features ${{ matrix.features }}
          else
            cargo build --release --manifest-path ${{ matrix.manifest }} --target ${{ matrix.target }}
          fi

      # Copy the binary to the repo root with a platform-stamped name so all
      # artifacts can be collected in a flat directory later.
      - name: Stage artifact
        shell: bash
        run: |
          # Workspace builds land in the repo-root target/, not per-crate.
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}${{ matrix.ext }}"
          artifact="${{ matrix.binary }}-${{ matrix.target }}${{ matrix.ext }}"
          cp "${src}" "${artifact}"
          echo "ARTIFACT=${artifact}" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary }}-${{ matrix.target }}
          path: ${{ env.ARTIFACT }}
          retention-days: 1

  # ── sempkg (CUDA / NVIDIA GPU) ──────────────────────────────────────────────
  # Separate job from `build` because it needs the CUDA toolkit installed and,
  # on Windows, bundles the CUDA runtime DLLs alongside the binary. See
  # docs/gpu-cuda.md for the runtime/driver requirements this produces.
  build-cuda:
    name: Build sempkg (CUDA) — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: -C debuginfo=0
      # The llama-cpp-sys build script forwards any CMAKE_* env var to CMake as
      # a -D define, so this pins the GPU architectures llama.cpp is compiled
      # for instead of the sys-crate default. Targets CUDA 13, which supports
      # Turing (sm_75) and newer — Maxwell/Pascal/Volta are dropped. `75-virtual`
      # emits Turing PTX the driver JIT-compiles for any newer card; 86-real and
      # 89-real ship ready-to-run SASS for the common RTX 30xx/40xx cards, and
      # 90-virtual covers Hopper/Blackwell via PTX.
      CMAKE_CUDA_ARCHITECTURES: "75-virtual;80-virtual;86-real;89-real;90-virtual"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""

    steps:
      - uses: actions/checkout@v7

      - name: Free disk space (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: ${{ matrix.target }}-cuda

      # Provides nvcc + the cudart/cublas headers and import libraries, and on
      # Windows the redistributable runtime DLLs bundled in the package step.
      # Targets CUDA 13 (Turing sm_75 and newer; see CMAKE_CUDA_ARCHITECTURES).
      # GitHub caching is disabled so the ~3 GB installer doesn't evict the Rust
      # build cache from the repo's 10 GB Actions cache budget.
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '13.2.0'
          method: 'local'
          linux-local-args: '["--toolkit"]'
          use-github-cache: false

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang libclang-dev llvm-dev

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm --no-progress -y

      - name: Resolve LIBCLANG_PATH (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Resolve LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # GPU offload is most valuable for the embedding + query-expansion + rerank
      # models, so the CUDA artifact enables all local-inference features.
      - name: Build (CUDA)
        shell: bash
        run: |
          cargo build --release \
            --manifest-path src/sempkg/Cargo.toml \
            --target ${{ matrix.target }} \
            --features reranker,embeddings,cuda

      # Windows links the CUDA runtime dynamically, so ship the redistributable
      # DLLs next to the binary. This frees users from installing the CUDA
      # Toolkit — but NOT from having an NVIDIA driver: nvcuda.dll ships with the
      # driver and cannot legally be redistributed.
      - name: Package (Windows — bundle CUDA runtime DLLs)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "sempkg-${{ matrix.target }}-cuda"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/sempkg.exe" $stage
          # CUDA 13 reorganised the Windows toolkit layout, so search the whole
          # toolkit tree rather than assuming the DLLs live in \bin.
          foreach ($pat in @('cudart64_*.dll','cublas64_*.dll','cublasLt64_*.dll')) {
            $dll = Get-ChildItem -Path $env:CUDA_PATH -Filter $pat -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($null -eq $dll) { throw "Missing CUDA runtime DLL '$pat' under $env:CUDA_PATH" }
            Copy-Item $dll.FullName $stage
            Write-Host "bundled $($dll.Name)"
          }
          if (Test-Path docs/gpu-cuda.md) { Copy-Item docs/gpu-cuda.md "$stage/README-GPU.md" }
          Compress-Archive -Path "$stage/*" -DestinationPath "$stage.zip" -Force
          "ARTIFACT=$stage.zip"     | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ARTIFACT_NAME=$stage"    | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # Linux links the CUDA runtime statically, so the binary is self-contained
      # apart from the driver's libcuda.so — ship it as a single file.
      - name: Package (Linux — static CUDA runtime, single binary)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          artifact="sempkg-${{ matrix.target }}-cuda"
          cp "target/${{ matrix.target }}/release/sempkg" "$artifact"
          echo "ARTIFACT=$artifact"      >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=$artifact" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT }}
          retention-days: 1

  # ── sempkg (Vulkan / vendor-neutral GPU) ────────────────────────────────────
  # The CUDA artifacts target Turing (sm_75) and newer, so Maxwell/Pascal cards
  # — and every AMD/Intel GPU — have no GPU build. Vulkan is the vendor-neutral
  # fallback accel.rs already documents. Unlike CUDA there is nothing to bundle:
  # the loader (`vulkan-1.dll` / `libvulkan.so.1`) ships with the GPU driver on
  # Windows and comes from the distro (`libvulkan1`) on Linux. See
  # docs/gpu-vulkan.md.
  build-vulkan:
    name: Build sempkg (Vulkan) — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: -C debuginfo=0
      # Pinned so a broken upstream SDK release can't silently break a tag build.
      VULKAN_VERSION: 1.4.313.2
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""

    steps:
      - uses: actions/checkout@v7

      - name: Free disk space (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo apt-get clean
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          # Bumped to -v2 with the Ninja switch: a target/ cached from the
          # Visual Studio generator would carry a CMakeCache.txt that a Ninja
          # configure refuses ("generator mismatch").
          key: ${{ matrix.target }}-vulkan-v2
          # The Windows row builds into a short out-of-tree CARGO_TARGET_DIR (see
          # the path-length step below), so there is no in-workspace target/ to
          # cache there. The registry/index cache still applies on both rows.
          cache-targets: ${{ runner.os != 'Windows' }}

      # The ggml Vulkan backend compiles its shaders at build time, so the SDK
      # (headers, loader import library, and the glslc compiler) must be present
      # — a GPU is only needed at *run* time. Both installs come straight from
      # LunarG, the upstream Vulkan SDK publisher, so no third-party action is
      # involved.
      - name: Install Vulkan SDK (Linux — LunarG apt repository)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update -q
          sudo apt-get install -y vulkan-sdk

      - name: Install Vulkan SDK (Windows — LunarG installer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = "$env:RUNNER_TEMP\VulkanSDK-Installer.exe"
          curl.exe -o $installer -L "https://sdk.lunarg.com/sdk/download/$env:VULKAN_VERSION/windows/vulkansdk-windows-X64-$env:VULKAN_VERSION.exe"
          & $installer --accept-licenses --default-answer --confirm-command install
          # llama-cpp-sys reads VULKAN_SDK to find Lib\vulkan-1.lib; glslc lives in Bin.
          "VULKAN_SDK=C:\VulkanSDK\$env:VULKAN_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "C:\VulkanSDK\$env:VULKAN_VERSION\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang libclang-dev llvm-dev

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm --no-progress -y

      # Two Windows-only settings, both needed to build ggml's Vulkan backend.
      #
      # 1. CARGO_TARGET_DIR — ggml compiles its Vulkan shaders with
      #    `vulkan-shaders-gen`, a host tool built as a CMake ExternalProject.
      #    Its build tree nests deeply (…/build/llama-cpp-sys-2-<hash>/out/build/
      #    ggml/src/ggml-vulkan/vulkan-shaders-gen-prefix/src/…-build/CMakeFiles/
      #    CMakeScratch/TryCompile-xxxxxx/…), and under the default
      #    D:\a\sempkg\sempkg\target root the object paths reach 252 characters —
      #    past the 250-char limit CMake enforces (CMAKE_OBJECT_PATH_MAX), after
      #    which cl.exe fails with "C1083: Cannot open compiler generated file:
      #    ''". llama-cpp-sys documents this ("crates that depend on
      #    llama-cpp-rs w/ vulkan easily exceed the default PATH_MAX on
      #    windows"); its own workaround only covers MSBuild's FileTracker, not
      #    the path length. A short root buys back 20 characters, and building
      #    for the host triple (no --target, see the Build step) another 23.
      #
      # 2. CMAKE_GENERATOR=Ninja — under the Visual Studio generator the
      #    ExternalProject's configure runs inside an MSBuild custom-build step,
      #    whose nested MSBuild inherits a broken environment ("The system
      #    cannot find the batch label specified - VCEnd") and runs the
      #    ExternalProject steps out of order. Ninja invokes that configure as a
      #    plain cmake call in the same environment.
      #
      # Both are scoped to this job: the CUDA and CPU Windows builds have no
      # ExternalProject, so they keep the default generator and target dir.
      - name: Install Ninja and shorten the CMake build path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja --no-progress -y
          }
          ninja --version
          "CMAKE_GENERATOR=Ninja"  | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_TARGET_DIR=C:/vk" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve LIBCLANG_PATH (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Resolve LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # On Windows this builds for the host triple (which *is* matrix.target) with
      # no --target flag: that drops the `x86_64-pc-windows-msvc/` path segment
      # and, with the short CARGO_TARGET_DIR above, brings ggml's deepest
      # Vulkan object path from 252 characters down to ~209 — comfortably under
      # the 250-char limit rather than a couple of characters below it.
      - name: Build (Vulkan)
        shell: bash
        run: |
          set -eu
          tdir="${CARGO_TARGET_DIR:-target}"

          if [ "${{ runner.os }}" = "Windows" ]; then
            cargo build --release \
              --manifest-path src/sempkg/Cargo.toml \
              --features reranker,embeddings,vulkan
            echo "SEMPKG_BIN=${tdir}/release/sempkg${{ matrix.ext }}" >> "$GITHUB_ENV"
          else
            cargo build --release \
              --manifest-path src/sempkg/Cargo.toml \
              --target ${{ matrix.target }} \
              --features reranker,embeddings,vulkan
            echo "SEMPKG_BIN=${tdir}/${{ matrix.target }}/release/sempkg${{ matrix.ext }}" >> "$GITHUB_ENV"
          fi

      # Nothing to bundle: the Vulkan loader ships with the driver (Windows) or
      # the distro's libvulkan1 (Linux), so both platforms get a single binary.
      - name: Stage artifact
        shell: bash
        run: |
          set -eu
          artifact="sempkg-${{ matrix.target }}-vulkan${{ matrix.ext }}"
          cp "${SEMPKG_BIN}" "$artifact"
          echo "ARTIFACT=$artifact" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sempkg-${{ matrix.target }}-vulkan
          path: ${{ env.ARTIFACT }}
          retention-days: 1

  bundle-sempkg:
    name: Build and sign sempkg SemBundle
    needs: build
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: -C debuginfo=0
    steps:
      - uses: actions/checkout@v7

      - name: Free disk space (Ubuntu)
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo apt-get clean
          df -h

      - name: Download sembundle (Linux)
        uses: actions/download-artifact@v4
        with:
          name: sembundle-x86_64-unknown-linux-gnu
          path: tools/

      - name: Resolve sembundle binary path
        shell: bash
        run: |
          SEMBUNDLE_BIN=$(find tools -maxdepth 1 -type f -name 'sembundle*' | head -1)
          if [ -z "$SEMBUNDLE_BIN" ]; then
            echo "No sembundle binary found in tools/"
            ls -la tools || true
            exit 1
          fi
          chmod +x "$SEMBUNDLE_BIN"
          echo "SEMBUNDLE_BIN=$SEMBUNDLE_BIN" >> "$GITHUB_ENV"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install CodeGraph
        run: npm install -g @colbymchenry/codegraph

      - name: Resolve version and CodeGraph version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            # Manual (workflow_dispatch) runs have no release tag; stamp a dev
            # version so the bundle still builds for smoke-testing.
            echo "VERSION=0.0.0-dev.${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi
          CG_VER=$(codegraph --version 2>&1 | grep -oP '\d+\.\d+\.\d+' | head -1)
          echo "CODEGRAPH_VERSION=${CG_VER:-unknown}" >> "$GITHUB_ENV"

      - name: Build sempkg SemBundle
        run: |
          "$SEMBUNDLE_BIN" build \
            --name sempkg \
            --version "$VERSION" \
            --source-repo https://github.com/willem445/sempkg \
            --commit-hash "${{ github.sha }}" \
            --codegraph-version "$CODEGRAPH_VERSION" \
            --source-dir src/sempkg/src \
            --docs-dir docs \
            --language rust \
            --output "sempkg-${VERSION}.sembundle"

      - name: Write signing key
        env:
          SEMBUNDLE_SIGNING_KEY: ${{ secrets.SEMBUNDLE_SIGNING_KEY }}
        shell: bash
        run: |
          printf '%b' "$SEMBUNDLE_SIGNING_KEY" | tr -d '\r' > "$RUNNER_TEMP/private.pem"
          chmod 600 "$RUNNER_TEMP/private.pem"

      - name: Sign bundle
        run: |
          "$SEMBUNDLE_BIN" sign "sempkg-${VERSION}.sembundle" --key "$RUNNER_TEMP/private.pem"

      - name: Remove signing key
        if: always()
        run: rm -f "$RUNNER_TEMP/private.pem"

      - name: Stage public key
        run: cp keys/public.pem public.pem

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sempkg-sembundle
          path: |
            sempkg-${{ env.VERSION }}.sembundle
            sempkg-${{ env.VERSION }}.sembundle.sig
            public.pem
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: [build, build-cuda, build-vulkan, bundle-sempkg]
    # Only publish a GitHub Release for real tag pushes; manual
    # (workflow_dispatch) runs stop after building artifacts.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          find . -type f | sort | xargs sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
