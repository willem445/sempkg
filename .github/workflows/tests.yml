name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install codegraph
        run: npm install -g @colbymchenry/codegraph

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run pytest
        run: python -m pytest --cov=src/sempkg_registry --cov-report=term-missing

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  rust-test:
    name: Rust tests — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_DIR: target
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: -C debuginfo=0
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo apt-get clean
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: test-rust-${{ matrix.os }}

      # aws-lc-rs requires cmake + clang on Linux
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang libclang-dev llvm-dev

      # llvm-config + libclang are needed by bindgen (llama-cpp-sys via
      # sempkg's optional reranker feature).
      - name: Install LLVM and libclang (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install llvm

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm --no-progress -y

      - name: Resolve LIBCLANG_PATH (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if command -v llvm-config >/dev/null 2>&1; then
            echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
            exit 0
          fi

          for p in /opt/homebrew/opt/llvm/bin /usr/local/opt/llvm/bin; do
            if [ -x "$p/llvm-config" ]; then
              echo "LIBCLANG_PATH=$($p/llvm-config --libdir)" >> "$GITHUB_ENV"
              exit 0
            fi
          done

          echo "llvm-config not found; cannot resolve LIBCLANG_PATH" >&2
          exit 1

      - name: Resolve LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # NASM improves aws-lc-rs assembly on Windows
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      # lance-encoding requires protoc at build time
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test sembundle
        run: cargo test --manifest-path src/sembundle/Cargo.toml

      # Mirror the feature set the release CPU artifacts ship with, so what CI
      # compiles and tests is what users actually run. (`--all-features` is not
      # usable here: the GPU backends pull in mutually exclusive vendor SDKs.)
      - name: Test sempkg
        run: cargo test --manifest-path src/sempkg/Cargo.toml --features reranker,embeddings

  functional-tests:
    name: Functional MCP tests (ubuntu)
    runs-on: ubuntu-latest
    # Only run on pushes/PRs to main, and on
    # manual dispatch — this job downloads & indexes an external repo so it
    # takes several minutes.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    env:
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python test dependencies
        run: uv pip install --system pytest

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install codegraph CLI (required by sembundle indexer)
        run: npm install -g @colbymchenry/codegraph

      # ---- Rust build dependencies ----

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang libclang-dev llvm-dev

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: functional-rust-ubuntu

      - name: Resolve LIBCLANG_PATH
        shell: bash
        run: |
          if command -v llvm-config >/dev/null 2>&1; then
            echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
            exit 0
          fi
          for p in /usr/lib/llvm-*/lib; do
            if [ -e "$p/libclang.so" ] || ls "$p"/libclang-*.so 2>/dev/null | grep -q .; then
              echo "LIBCLANG_PATH=$p" >> "$GITHUB_ENV"
              exit 0
            fi
          done
          echo "libclang not found" >&2
          exit 1

      - name: Build sempkg release binary
        run: cargo build --release --manifest-path src/sempkg/Cargo.toml --features reranker,embeddings

      # ---- Install the test bundle ----

      - name: Create test workspace
        run: mkdir -p /tmp/sempkg-test-workspace

      - name: Initialize sempkg workspace
        run: ./target/release/sempkg init --workspace /tmp/sempkg-test-workspace
        env:
          SEMPKG_WORKSPACE: /tmp/sempkg-test-workspace

      - name: Enable reranker in test workspace
        run: |
          cat >> /tmp/sempkg-test-workspace/sempkg.toml << 'EOF'

          [reranker]
          enabled = true
          top_k = 20
          output_n = 5
          EOF

      - name: Download Qwen3-Reranker GGUF model from HuggingFace
        run: ./target/release/sempkg reranker pull --workspace /tmp/sempkg-test-workspace
        env:
          SEMPKG_WORKSPACE: /tmp/sempkg-test-workspace
        timeout-minutes: 10

      - name: Verify reranker is configured and model is present
        run: ./target/release/sempkg reranker status --workspace /tmp/sempkg-test-workspace
        env:
          SEMPKG_WORKSPACE: /tmp/sempkg-test-workspace

      - name: Install codegraph bundle (fresh build with new sembundle)
        run: |
          ./target/release/sempkg add colbymchenry/codegraph@v0.9.7 \
            --include-source \
            --source-dir src/ \
            --docs-dir docs/ \
            --workspace /tmp/sempkg-test-workspace \
            --reinstall
        env:
          SEMPKG_WORKSPACE: /tmp/sempkg-test-workspace
        timeout-minutes: 15

      - name: Install lancedb bundle for query benchmarks
        run: |
          ./target/release/sempkg add lancedb/lancedb@v0.30.0 \
            --include-source \
            --source-dir rust/lancedb/src \
            --docs-dir docs/src \
            --workspace /tmp/sempkg-test-workspace \
            --reinstall
        env:
          SEMPKG_WORKSPACE: /tmp/sempkg-test-workspace
        timeout-minutes: 20

      - name: Install local sempkg bundle for query benchmarks
        run: |
          ./target/release/sempkg add . \
            --name sempkg \
            --include-source \
            --source-dir src/sempkg/src \
            --docs-dir docs \
            --workspace /tmp/sempkg-test-workspace \
            --reinstall
        env:
          SEMPKG_WORKSPACE: /tmp/sempkg-test-workspace
        timeout-minutes: 20

      - name: Install llama-cpp-rs bundle for pooling benchmark
        run: |
          ./target/release/sempkg add utilityai/llama-cpp-rs@0.1.150 \
            --include-source \
            --source-dir llama-cpp-2/src \
            --docs-dir examples/reranker \
            --workspace /tmp/sempkg-test-workspace \
            --reinstall
        env:
          SEMPKG_WORKSPACE: /tmp/sempkg-test-workspace
        timeout-minutes: 20

      # ---- Run tests ----

      - name: Run functional MCP tests
        run: |
          pytest tests/test_mcp_functional.py -v \
            --override-ini="addopts=-v" \
            --tb=short
        env:
          SEMPKG_WORKSPACE: /tmp/sempkg-test-workspace
