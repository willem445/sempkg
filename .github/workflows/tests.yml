name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install codegraph
        run: npm install -g @colbymchenry/codegraph

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run pytest
        run: python -m pytest

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  rust-test:
    name: Rust tests — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache sembundle build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/sembundle -> target
          key: test-sembundle-${{ matrix.os }}

      - name: Cache sempkg build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/sempkg -> target
          key: test-sempkg-${{ matrix.os }}

      # aws-lc-rs requires cmake + clang on Linux
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang libclang-dev llvm-dev

      # llvm-config + libclang are needed by bindgen (llama-cpp-sys via
      # sempkg's optional reranker feature).
      - name: Install LLVM and libclang (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install llvm

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm --no-progress -y

      - name: Resolve LIBCLANG_PATH (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if command -v llvm-config >/dev/null 2>&1; then
            echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
            exit 0
          fi

          for p in /opt/homebrew/opt/llvm/bin /usr/local/opt/llvm/bin; do
            if [ -x "$p/llvm-config" ]; then
              echo "LIBCLANG_PATH=$($p/llvm-config --libdir)" >> "$GITHUB_ENV"
              exit 0
            fi
          done

          echo "llvm-config not found; cannot resolve LIBCLANG_PATH" >&2
          exit 1

      - name: Resolve LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # NASM improves aws-lc-rs assembly on Windows
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      # lance-encoding requires protoc at build time
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test sembundle
        run: cargo test --manifest-path src/sembundle/Cargo.toml

      - name: Test sempkg
        run: cargo test --manifest-path src/sempkg/Cargo.toml --features reranker
