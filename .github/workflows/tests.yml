name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install codegraph
        run: npm install -g @colbymchenry/codegraph

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run pytest
        run: python -m pytest

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  rust-test:
    name: Rust tests — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache sembundle build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/sembundle -> target
          key: test-sembundle-${{ matrix.os }}

      - name: Cache sempkg build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/sempkg -> target
          key: test-sempkg-${{ matrix.os }}

      # aws-lc-rs requires cmake + clang on Linux
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang

      # NASM improves aws-lc-rs assembly on Windows
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Test sembundle
        run: cargo test --manifest-path src/sembundle/Cargo.toml

      - name: Test sempkg
        run: cargo test --manifest-path src/sempkg/Cargo.toml
