# Example: bundle the repo and publish to the sempkg registry.
#
# Copy into .github/workflows/ in the repo you want to expose through the agent.
# Two triggers:
#   * push to main  -> publishes a rolling "latest" bundle ("how does X work today?")
#   * tag v*        -> publishes that immutable release ("in v14.2.0, how did X work?")
#
# Secrets required:
#   REGISTRY_URL    e.g. https://knowledge.internal.example.com  (the registry)
#   REGISTRY_TOKEN  a publish token minted via POST /admin/tokens (see deploy/README.md)
name: publish-bundle

on:
  push:
    branches: [main]
    tags: ["v*"]

# Avoid overlapping "latest" publishes racing each other.
concurrency:
  group: publish-bundle-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install sempkg + sembundle
        run: |
          curl -fsSL https://raw.githubusercontent.com/willem445/sempkg/main/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Compute bundle version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"   # e.g. 14.2.0
          else
            echo "version=latest" >> "$GITHUB_OUTPUT"                 # rolling main
          fi

      - name: Build bundle
        run: |
          sembundle build \
            --name ourcode \
            --version "${{ steps.ver.outputs.version }}" \
            --source-dir ./src \
            --docs-dir ./docs \
            --output "ourcode-${{ steps.ver.outputs.version }}.sembundle"

      - name: Publish to registry
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          curl -fsSL -X POST "${REGISTRY_URL}/publish" \
            -H "Authorization: Bearer ${REGISTRY_TOKEN}" \
            -F "file=@ourcode-${{ steps.ver.outputs.version }}.sembundle"
