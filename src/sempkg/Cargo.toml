[package]
name = "sempkg"
version = "0.1.0"
edition = "2021"
description = "sempkg — semantic package manager for cgbundle archives with MCP server support"

[[bin]]
name = "sempkg"
path = "src/main.rs"

[dependencies]
clap         = { version = "4", features = ["derive", "env"] }
tokio        = { version = "1", features = ["full"] }
serde        = { version = "1", features = ["derive"] }
serde_json   = "1"
toml         = "0.8"
toml_edit    = "0.22"
reqwest      = { version = "0.12", features = ["blocking", "json"] }
sha2         = "0.10"
hex          = "0.4"
tar          = "0.4"
flate2       = "1"
ed25519-dalek = { version = "2", features = ["pkcs8", "pem"] }
rusqlite     = { version = "0.31", features = ["bundled"] }
anyhow       = "1"
thiserror    = "1"
chrono       = { version = "0.4", features = ["serde"] }
dirs         = "5"
tempfile     = "3"
walkdir      = "2"
which        = "6"
