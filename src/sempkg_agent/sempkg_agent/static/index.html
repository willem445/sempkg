<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>sempkg-agent · chat</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --border: #2a2f3a;
    --text: #e6e9ef; --muted: #9aa3b2; --accent: #6ea8fe; --accent2: #4ade80;
    --user: #243049; --warn: #f0b429; --err: #f87171; --code: #11141a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 14px; padding: 10px 16px;
    border-bottom: 1px solid var(--border); background: var(--panel); flex-wrap: wrap; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .2px; }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
  header .spacer { flex: 1; }
  .ctrl { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; }
  select, button { font: inherit; color: var(--text); background: var(--panel2);
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #08101e; border-color: var(--accent); font-weight: 600; }
  .switch { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; user-select: none; }
  .switch input { display: none; }
  .switch .track { width: 34px; height: 19px; border-radius: 999px; background: var(--panel2);
    border: 1px solid var(--border); position: relative; transition: .15s; }
  .switch .track::after { content: ""; position: absolute; top: 2px; left: 2px; width: 13px; height: 13px;
    border-radius: 50%; background: var(--muted); transition: .15s; }
  .switch input:checked + .track { background: rgba(110,168,254,.35); border-color: var(--accent); }
  .switch input:checked + .track::after { left: 16px; background: var(--accent); }
  main { flex: 1; overflow-y: auto; padding: 20px 16px; }
  .wrap { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
  .msg { display: flex; flex-direction: column; gap: 6px; }
  .msg .who { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .bubble { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .msg.user .bubble { background: var(--user); border-color: #34507e; align-self: flex-end; max-width: 80%; }
  .msg.user { align-items: flex-end; }
  .activity { border: 1px dashed var(--border); border-radius: 10px; padding: 8px 10px; background: var(--panel2);
    font-size: 13px; display: flex; flex-direction: column; gap: 6px; }
  .activity.hidden { display: none; }
  .step { display: flex; gap: 8px; align-items: baseline; }
  .step .tag { font-size: 11px; padding: 1px 7px; border-radius: 999px; white-space: nowrap; border: 1px solid var(--border); }
  .tag.think { color: var(--accent); border-color: rgba(110,168,254,.4); }
  .tag.call { color: var(--accent2); border-color: rgba(74,222,128,.4); }
  .tag.result { color: var(--muted); }
  .tag.err { color: var(--err); border-color: rgba(248,113,113,.4); }
  .step .body { color: var(--text); white-space: pre-wrap; word-break: break-word; flex: 1; }
  .step .body.dim { color: var(--muted); }
  .status { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .spinner { width: 13px; height: 13px; border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .summary { font-size: 15px; }
  .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .finding { border: 1px solid var(--border); border-radius: 10px; margin-top: 10px; overflow: hidden; }
  .finding .fhead { padding: 7px 10px; background: var(--panel2); display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
  .finding .loc { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px; color: var(--accent); }
  .finding .pkg { font-size: 11px; padding: 1px 7px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); }
  .finding .why { padding: 6px 10px; font-size: 13px; color: var(--muted); }
  .finding pre { margin: 0; padding: 10px; background: var(--code); overflow-x: auto; border-top: 1px solid var(--border); }
  .finding pre code { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px; white-space: pre; }
  .clar { border-left: 3px solid var(--warn); padding-left: 10px; }
  .clar .q { font-weight: 600; }
  .err-box { color: var(--err); }
  footer { border-top: 1px solid var(--border); background: var(--panel); padding: 12px 16px; }
  .composer { max-width: 860px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; resize: none; min-height: 44px; max-height: 200px; font: inherit; color: var(--text);
    background: var(--panel2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px; }
  textarea:focus { outline: none; border-color: var(--accent); }
  .hint { max-width: 860px; margin: 6px auto 0; color: var(--muted); font-size: 12px; }
  code.inline { background: var(--code); padding: 1px 5px; border-radius: 5px; font-family: ui-monospace, monospace; font-size: 12.5px; }
</style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>sempkg-agent</h1>
    <span class="spacer"></span>
    <label class="ctrl">model
      <select id="model" title="Routed to OpenRouter"></select>
    </label>
    <label class="switch ctrl" title="Stream the agent's reasoning and tool calls live">
      <input type="checkbox" id="showActivity" />
      <span class="track"></span> show activity
    </label>
    <button id="newChat" title="Start a fresh conversation">New chat</button>
  </header>

  <main><div class="wrap" id="messages"></div></main>

  <footer>
    <div class="composer">
      <textarea id="prompt" placeholder="Ask about an installed package… (Enter to send, Shift+Enter for newline)"></textarea>
      <button class="primary" id="send">Send</button>
    </div>
    <div class="hint">Grounded answers come only from installed sembundles. Optionally prefix with <code class="inline">@package</code> to scope (e.g. <code class="inline">@lancedb where is BM25 opened?</code>).</div>
  </footer>

<script>
const $ = (id) => document.getElementById(id);
const messagesEl = $("messages");
let sessionId = null;
let busy = false;

// ---- model dropdown ----
async function loadModels() {
  try {
    const r = await fetch("/v1/models");
    const data = await r.json();
    const sel = $("model");
    sel.innerHTML = "";
    const groups = {};
    for (const m of data.models) (groups[m.tier] ||= []).push(m);
    const order = ["cheap", "medium", "high", "default"];
    for (const tier of order) {
      if (!groups[tier]) continue;
      const og = document.createElement("optgroup");
      og.label = tier.toUpperCase();
      for (const m of groups[tier]) {
        const o = document.createElement("option");
        o.value = m.id; o.textContent = m.label; o.title = m.note || "";
        if (m.id === data.default) o.selected = true;
        og.appendChild(o);
      }
      sel.appendChild(og);
    }
  } catch (e) { console.error("model load failed", e); }
}

// ---- helpers ----
function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}
function addUser(text) {
  const m = el("div", "msg user");
  m.appendChild(el("div", "who", "you"));
  m.appendChild(el("div", "bubble", text));
  messagesEl.appendChild(m);
  scroll();
}
function scroll() { document.querySelector("main").scrollTop = 1e9; }

function locOf(f) {
  let s = f.file;
  if (f.start_line) { s += ":" + f.start_line; if (f.end_line && f.end_line !== f.start_line) s += "-" + f.end_line; }
  return s;
}

// ---- assistant turn ----
function newAssistantTurn(showActivity) {
  const m = el("div", "msg assistant");
  m.appendChild(el("div", "who", "sempkg-agent"));
  const bubble = el("div", "bubble");
  const activity = el("div", "activity" + (showActivity ? "" : " hidden"));
  const status = el("div", "status");
  status.appendChild(el("span", "spinner"));
  status.appendChild(el("span", null, "Working…"));
  const answer = el("div", "answer");
  bubble.appendChild(activity);
  bubble.appendChild(status);
  bubble.appendChild(answer);
  m.appendChild(bubble);
  messagesEl.appendChild(m);
  scroll();
  return { activity, status, answer };
}
function addStep(activity, tagCls, tagText, bodyText, dim) {
  const step = el("div", "step");
  step.appendChild(el("span", "tag " + tagCls, tagText));
  step.appendChild(el("div", "body" + (dim ? " dim" : ""), bodyText));
  activity.appendChild(step);
  scroll();
}

function renderResult(answer, result) {
  answer.innerHTML = "";
  answer.appendChild(el("div", "summary", result.summary || ""));
  const bits = [];
  if (result.packages_searched && result.packages_searched.length)
    bits.push("searched: " + result.packages_searched.join(", "));
  if (result.findings) bits.push(result.findings.length + " finding(s)");
  if (bits.length) answer.appendChild(el("div", "meta", bits.join("  ·  ")));
  if (result.reasoning) answer.appendChild(el("div", "meta", "Reasoning: " + result.reasoning));
  for (const f of (result.findings || [])) {
    const card = el("div", "finding");
    const head = el("div", "fhead");
    head.appendChild(el("span", "pkg", f.package));
    head.appendChild(el("span", "loc", locOf(f) + (f.symbol ? "  ·  " + f.symbol : "")));
    card.appendChild(head);
    if (f.explanation) card.appendChild(el("div", "why", f.explanation));
    const pre = el("pre"); const code = el("code", null, f.snippet || ""); pre.appendChild(code);
    card.appendChild(pre);
    answer.appendChild(card);
  }
  scroll();
}
function renderClarification(answer, ev) {
  answer.innerHTML = "";
  const box = el("div", "clar");
  box.appendChild(el("div", "q", ev.question));
  if (ev.rationale) box.appendChild(el("div", "meta", ev.rationale));
  box.appendChild(el("div", "meta", "Reply below to continue."));
  answer.appendChild(box);
  scroll();
}

// ---- send + stream ----
async function send() {
  if (busy) return;
  const ta = $("prompt");
  let text = ta.value.trim();
  if (!text) return;
  let pkg = null;
  const mAt = text.match(/^@([\w.\-\/]+)\s+([\s\S]+)$/);
  if (mAt) { pkg = mAt[1]; text = mAt[2]; }
  ta.value = "";
  busy = true; $("send").disabled = true;
  addUser((pkg ? "@" + pkg + " " : "") + text);

  const showActivity = $("showActivity").checked;
  const turn = newAssistantTurn(showActivity);

  const body = { prompt: text, model: $("model").value };
  if (pkg) body.package = pkg;
  if (sessionId) body.session_id = sessionId;

  try {
    const resp = await fetch("/v1/ask/stream", {
      method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body),
    });
    if (!resp.ok || !resp.body) throw new Error("HTTP " + resp.status);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf("\n\n")) >= 0) {
        const frame = buf.slice(0, idx); buf = buf.slice(idx + 2);
        const line = frame.split("\n").find((l) => l.startsWith("data:"));
        if (!line) continue;
        handleEvent(JSON.parse(line.slice(5).trim()), turn);
      }
    }
  } catch (e) {
    turn.status.style.display = "none";
    turn.answer.appendChild(el("div", "err-box", "Request failed: " + e.message));
  } finally {
    busy = false; $("send").disabled = false; ta.focus();
  }
}

function handleEvent(ev, turn) {
  switch (ev.type) {
    case "status":
      if (ev.session_id) sessionId = ev.session_id;
      turn.status.querySelector("span:last-child").textContent =
        "Working… (" + (ev.model || "") + ")";
      break;
    case "reasoning":
      addStep(turn.activity, "think", "thinking", ev.text);
      break;
    case "tool_call":
      addStep(turn.activity, "call", ev.name, ev.input || "", true);
      break;
    case "tool_result":
      addStep(turn.activity, "result", ev.name + " ✓", ev.output || "", true);
      break;
    case "tool_error":
      addStep(turn.activity, "err", ev.name + " ✗", ev.error || "", true);
      break;
    case "final":
      if (ev.session_id) sessionId = ev.session_id;
      turn.status.style.display = "none";
      renderResult(turn.answer, ev.result);
      break;
    case "clarification":
      if (ev.session_id) sessionId = ev.session_id;
      turn.status.style.display = "none";
      renderClarification(turn.answer, ev);
      break;
    case "error":
      turn.status.style.display = "none";
      turn.answer.appendChild(el("div", "err-box", "Error: " + (ev.message || "unknown")));
      break;
    case "done":
      turn.status.style.display = "none";
      break;
  }
}

// ---- wiring ----
$("send").addEventListener("click", send);
$("prompt").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
$("newChat").addEventListener("click", () => {
  sessionId = null; messagesEl.innerHTML = ""; $("prompt").focus();
});
$("showActivity").addEventListener("change", (e) => {
  // Toggle visibility of all activity panels (live + past).
  document.querySelectorAll(".activity").forEach((a) => a.classList.toggle("hidden", !e.target.checked));
});
loadModels();
$("prompt").focus();
</script>
</body>
</html>
